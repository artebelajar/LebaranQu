<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - LebaranQu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Poppins', sans-serif; }
        
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .password-strength {
            height: 4px;
            transition: all 0.3s ease;
        }
        
        /* reCAPTCHA styling */
        .g-recaptcha {
            display: flex;
            justify-content: center;
            margin: 1rem 0;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-emerald-50 to-teal-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full fade-in">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-emerald-600 rounded-full mb-4 shadow-lg">
                <i class="fas fa-mosque text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">Lebaran<span class="text-emerald-600">Qu</span></h1>
            <p class="text-gray-600 mt-2">Silaturahmi Alumni • THR 50k</p>
        </div>

        <!-- Card Utama -->
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="p-8">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Daftar Akun Baru</h2>
                
                <form onsubmit="handleRegister(event)">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                Nama Lengkap <span class="text-red-500">*</span>
                            </label>
                            <input type="text" id="registerNama" required 
                                   placeholder="Masukkan nama lengkap" 
                                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                Email <span class="text-red-500">*</span>
                            </label>
                            <input type="email" id="registerEmail" required 
                                   placeholder="email@contoh.com" 
                                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                Password <span class="text-red-500">*</span>
                            </label>
                            <input type="password" id="registerPassword" required 
                                   placeholder="Minimal 6 karakter" minlength="6"
                                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500">
                            <div class="mt-2 password-strength w-full bg-gray-200 rounded-full overflow-hidden">
                                <div id="passwordStrength" class="h-1 bg-gray-300" style="width: 0%"></div>
                            </div>
                            <p class="text-xs text-gray-500 mt-1">Minimal 6 karakter, gunakan kombinasi huruf dan angka</p>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                Konfirmasi Password <span class="text-red-500">*</span>
                            </label>
                            <input type="password" id="registerConfirmPassword" required 
                                   placeholder="Ulangi password" minlength="6"
                                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">
                                Asal Sekolah <span class="text-red-500">*</span>
                            </label>
                            <select id="registerSekolah" required 
                                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500">
                                <option value="">Pilih Sekolah</option>
                                <option value="sdit_sahabat">SDIT Sahabat - Karanganyar</option>
                                <option value="pptq_almadinah">PPTQ Al-Madinah - Solo</option>
                                <option value="ppqit_almahir">PPQIT Al-Mahir - IT & Tahfidz</option>
                            </select>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nomor Telepon (opsional)</label>
                            <input type="tel" id="registerTelepon" 
                                   placeholder="08123456789" 
                                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Title/Pekerjaan (opsional)</label>
                            <input type="text" id="registerTitle" 
                                   placeholder="Contoh: Developer, Guru, Wirausaha" 
                                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Bio Singkat (opsional)</label>
                            <textarea id="registerBio" rows="2" 
                                      placeholder="Ceritakan sedikit tentang diri Anda..."
                                      class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500"></textarea>
                        </div>

                        <!-- reCAPTCHA -->
                        <div class="g-recaptcha" data-sitekey="6LdzAYgsAAAAAAkT_RsRpIweexUq1aEqQXcQ8EkO"></div>

                        <div class="bg-emerald-50 p-4 rounded-xl">
                            <p class="text-sm text-emerald-700 flex items-center">
                                <i class="fas fa-info-circle mr-2"></i>
                                Dengan mendaftar, Anda menyetujui syarat dan ketentuan yang berlaku.
                            </p>
                        </div>
                        
                        <button type="submit" 
                                class="w-full bg-emerald-600 text-white py-3 rounded-xl hover:bg-emerald-700 transition font-semibold text-lg">
                            <i class="fas fa-user-plus mr-2"></i>Register
                        </button>
                    </div>
                </form>
                
                <div class="mt-6 text-center">
                    <p class="text-gray-600">
                        Sudah punya akun? 
                        <a href="/login.html" class="text-emerald-600 hover:underline font-medium">
                            Login di sini
                        </a>
                    </p>
                    <p class="text-gray-600 mt-2">
                        <a href="/" class="text-gray-500 hover:text-gray-700 text-sm">
                            <i class="fas fa-arrow-left mr-1"></i>Kembali ke Beranda
                        </a>
                    </p>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="hidden fixed bottom-4 right-4 bg-white border-l-4 shadow-lg rounded-lg p-4 max-w-sm z-50">
            <div class="flex items-center">
                <div id="toastIcon" class="mr-3"></div>
                <p id="toastMessage" class="text-sm"></p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        // Cek session
        (function checkSession() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                window.location.href = '/';
            }
        })();

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const toastIcon = document.getElementById('toastIcon');
            
            toastMessage.textContent = message;
            
            if (type === 'success') {
                toast.classList.remove('border-red-500');
                toast.classList.add('border-emerald-500');
                toastIcon.innerHTML = '<i class="fas fa-check-circle text-emerald-500 text-xl"></i>';
            } else {
                toast.classList.remove('border-emerald-500');
                toast.classList.add('border-red-500');
                toastIcon.innerHTML = '<i class="fas fa-exclamation-circle text-red-500 text-xl"></i>';
            }
            
            toast.classList.remove('hidden');
            
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        // Password strength indicator
        document.getElementById('registerPassword')?.addEventListener('input', function(e) {
            const password = e.target.value;
            const strengthBar = document.getElementById('passwordStrength');
            let strength = 0;
            
            if (password.length >= 6) strength += 25;
            if (password.match(/[a-z]+/)) strength += 25;
            if (password.match(/[A-Z]+/)) strength += 25;
            if (password.match(/[0-9]+/)) strength += 25;
            if (password.match(/[$@#&!]+/)) strength += 25;
            
            strength = Math.min(100, strength);
            
            strengthBar.style.width = strength + '%';
            
            if (strength < 50) {
                strengthBar.className = 'h-1 bg-red-500';
            } else if (strength < 75) {
                strengthBar.className = 'h-1 bg-yellow-500';
            } else {
                strengthBar.className = 'h-1 bg-emerald-500';
            }
        });

        function showLoading() {
            const loadingEl = document.createElement('div');
            loadingEl.id = 'loadingOverlay';
            loadingEl.className = 'fixed inset-0 bg-white/80 flex items-center justify-center z-50';
            loadingEl.innerHTML = `
                <div class="text-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-4 border-emerald-600 border-t-transparent mx-auto mb-4"></div>
                    <p class="text-gray-700">Loading...</p>
                </div>
            `;
            document.body.appendChild(loadingEl);
        }

        function hideLoading() {
            const loadingEl = document.getElementById('loadingOverlay');
            if (loadingEl) loadingEl.remove();
        }

        // Handle Register
        async function handleRegister(event) {
            event.preventDefault();

            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;

            // Validasi password match
            if (password !== confirmPassword) {
                showToast('Password dan konfirmasi password tidak cocok', 'error');
                return;
            }

            if (password.length < 6) {
                showToast('Password minimal 6 karakter', 'error');
                return;
            }

            // Get reCAPTCHA token
            let recaptchaResponse = '';
            try {
                recaptchaResponse = grecaptcha.getResponse();
                console.log('Register reCAPTCHA response:', recaptchaResponse ? '✅ OK' : '❌ Empty');
            } catch (e) {
                console.error('reCAPTCHA error:', e);
                showToast('Error reCAPTCHA, refresh halaman', 'error');
                return;
            }
            
            if (!recaptchaResponse) {
                showToast('Harap centang reCAPTCHA', 'error');
                return;
            }

            const userData = {
                namaLengkap: document.getElementById('registerNama').value.trim(),
                asalSekolah: document.getElementById('registerSekolah').value,
                email: document.getElementById('registerEmail').value.trim(),
                password: password,
                nomorTelepon: document.getElementById('registerTelepon').value.trim() || null,
                title: document.getElementById('registerTitle').value.trim() || 'Alumni',
                bioSingkat: document.getElementById('registerBio').value.trim() || null,
                recaptchaToken: recaptchaResponse
            };

            // Validasi input wajib
            if (!userData.namaLengkap || !userData.asalSekolah || !userData.email) {
                showToast('Nama lengkap, asal sekolah, dan email wajib diisi', 'error');
                return;
            }

            showLoading();

            try {
                const res = await fetch(`${API_BASE}/users/register`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(userData)
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    localStorage.setItem('userToken', data.token);
                    
                    showToast('Registrasi berhasil!');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showToast(data.error || 'Registrasi gagal', 'error');
                    grecaptcha.reset();
                }
            } catch (error) {
                console.error('Register error:', error);
                showToast('Error: ' + error.message, 'error');
                grecaptcha.reset();
            } finally {
                hideLoading();
            }
        }

        // Debug: Cek apakah reCAPTCHA sudah dimuat
        window.onload = function() {
            console.log('Page loaded, checking reCAPTCHA...');
            if (typeof grecaptcha !== 'undefined') {
                console.log('✅ reCAPTCHA loaded');
            } else {
                console.error('❌ reCAPTCHA not loaded');
            }
        };
    </script>
</body>
</html>
