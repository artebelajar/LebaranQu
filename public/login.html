<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LebaranQu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Poppins', sans-serif; }
        
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* reCAPTCHA styling */
        .g-recaptcha {
            display: flex;
            justify-content: center;
            margin: 1rem 0;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-emerald-50 to-teal-100 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full fade-in">
        <!-- Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-emerald-600 rounded-full mb-4 shadow-lg">
                <i class="fas fa-mosque text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-800">Lebaran<span class="text-emerald-600">Qu</span></h1>
            <p class="text-gray-600 mt-2">Silaturahmi Alumni • THR 50k</p>
        </div>

        <!-- Card Utama -->
        <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="p-8">
                <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Masuk ke Akun</h2>
                
                <form onsubmit="handleLogin(event)">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                            <input type="email" id="loginEmail" required 
                                   placeholder="email@contoh.com" 
                                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                            <input type="password" id="loginPassword" required 
                                   placeholder="••••••••" 
                                   class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-emerald-500">
                        </div>
                        
                        <!-- reCAPTCHA -->
                        <div class="g-recaptcha" data-sitekey="6LdzAYgsAAAAAAkT_RsRpIweexUq1aEqQXcQ8EkO"></div>
                        
                        <button type="submit" 
                                class="w-full bg-emerald-600 text-white py-3 rounded-xl hover:bg-emerald-700 transition font-semibold text-lg">
                            <i class="fas fa-sign-in-alt mr-2"></i>Login
                        </button>
                    </div>
                </form>

                <div class="mt-6 text-center">
                    <p class="text-gray-600">
                        Belum punya akun? 
                        <a href="/register.html" class="text-emerald-600 hover:underline font-medium">
                            Daftar di sini
                        </a>
                    </p>
                    <p class="text-gray-600 mt-2">
                        <a href="/" class="text-gray-500 hover:text-gray-700 text-sm">
                            <i class="fas fa-arrow-left mr-1"></i>Kembali ke Beranda
                        </a>
                    </p>
                </div>
            </div>
        </div>

        <!-- Toast Notification -->
        <div id="toast" class="hidden fixed bottom-4 right-4 bg-white border-l-4 shadow-lg rounded-lg p-4 max-w-sm z-50">
            <div class="flex items-center">
                <div id="toastIcon" class="mr-3"></div>
                <p id="toastMessage" class="text-sm"></p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        // Cek session
        (function checkSession() {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                window.location.href = '/';
            }
        })();

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            const toastIcon = document.getElementById('toastIcon');
            
            toastMessage.textContent = message;
            
            if (type === 'success') {
                toast.classList.remove('border-red-500');
                toast.classList.add('border-emerald-500');
                toastIcon.innerHTML = '<i class="fas fa-check-circle text-emerald-500 text-xl"></i>';
            } else {
                toast.classList.remove('border-emerald-500');
                toast.classList.add('border-red-500');
                toastIcon.innerHTML = '<i class="fas fa-exclamation-circle text-red-500 text-xl"></i>';
            }
            
            toast.classList.remove('hidden');
            
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 3000);
        }

        function showLoading() {
            const loadingEl = document.createElement('div');
            loadingEl.id = 'loadingOverlay';
            loadingEl.className = 'fixed inset-0 bg-white/80 flex items-center justify-center z-50';
            loadingEl.innerHTML = `
                <div class="text-center">
                    <div class="animate-spin rounded-full h-12 w-12 border-4 border-emerald-600 border-t-transparent mx-auto mb-4"></div>
                    <p class="text-gray-700">Loading...</p>
                </div>
            `;
            document.body.appendChild(loadingEl);
        }

        function hideLoading() {
            const loadingEl = document.getElementById('loadingOverlay');
            if (loadingEl) loadingEl.remove();
        }

        // Handle Login
        async function handleLogin(event) {
            event.preventDefault();

            // Get reCAPTCHA token
            let recaptchaResponse = '';
            try {
                recaptchaResponse = grecaptcha.getResponse();
                console.log('Login reCAPTCHA response:', recaptchaResponse ? '✅ OK' : '❌ Empty');
            } catch (e) {
                console.error('reCAPTCHA error:', e);
                showToast('Error reCAPTCHA, refresh halaman', 'error');
                return;
            }
            
            if (!recaptchaResponse) {
                showToast('Harap centang reCAPTCHA', 'error');
                return;
            }

            const loginData = {
                email: document.getElementById('loginEmail').value.trim(),
                password: document.getElementById('loginPassword').value,
                recaptchaToken: recaptchaResponse
            };

            // Validasi input
            if (!loginData.email || !loginData.password) {
                showToast('Email dan password harus diisi', 'error');
                return;
            }

            showLoading();

            try {
                const res = await fetch(`${API_BASE}/users/login`, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(loginData)
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('currentUser', JSON.stringify(data.user));
                    localStorage.setItem('userToken', data.token);
                    
                    showToast('Login berhasil!');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    showToast(data.error || 'Login gagal', 'error');
                    grecaptcha.reset();
                }
            } catch (error) {
                console.error('Login error:', error);
                showToast('Error: ' + error.message, 'error');
                grecaptcha.reset();
            } finally {
                hideLoading();
            }
        }

        // Debug: Cek apakah reCAPTCHA sudah dimuat
        window.onload = function() {
            console.log('Page loaded, checking reCAPTCHA...');
            if (typeof grecaptcha !== 'undefined') {
                console.log('✅ reCAPTCHA loaded');
            } else {
                console.error('❌ reCAPTCHA not loaded');
            }
        };
    </script>
</body>
</html>
